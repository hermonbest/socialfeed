name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean stale lock file and install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Gradle wrapper jar
        run: |
          curl -sL https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Inject Telegram credentials from secrets
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          node -e "
            const fs = require('fs');
            let code = fs.readFileSync('src/services/notificationService.js', 'utf8');
            code = code.replace('__TELEGRAM_BOT_TOKEN__', process.env.TELEGRAM_BOT_TOKEN);
            code = code.replace('__TELEGRAM_CHAT_ID__', process.env.TELEGRAM_CHAT_ID);
            fs.writeFileSync('src/services/notificationService.js', code);
            console.log('Secrets injected successfully');
          "

      - name: Verify Telegram secrets were injected
        run: |
          if grep -q '__TELEGRAM_BOT_TOKEN__' src/services/notificationService.js || grep -q '__TELEGRAM_CHAT_ID__' src/services/notificationService.js; then
            echo "::error::Placeholders still present in notificationService.js!"
            exit 1
          fi
          echo "All placeholders replaced successfully"

      - name: Test Telegram bot token
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "Bot test: $(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getMe" | python3 -c "import sys,json; d=json.load(sys.stdin); print('@' + d['result']['username'] if d['ok'] else 'FAILED')")"

      - name: Bundle JS for Android
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APKs
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APKs with ABI info
        run: |
          cd android/app/build/outputs/apk/release
          for f in *.apk; do
            if [ -f "$f" ]; then
              abi=$(echo "$f" | sed -n 's/.*\(armeabi-v7a\|arm64-v8a\|x86_64\).*/\1/p')
              if [ -z "$abi" ]; then
                mv "$f" "PhotoStudio-$f"
              else
                mv "$f" "PhotoStudio-$abi.apk"
              fi
            fi
          done

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotoStudio-APKs
          path: android/app/build/outputs/apk/release/*.apk
          compression-level: 0

      - name: Get APK sizes
        run: |
          echo "### APK Build Sizes" >> $GITHUB_STEP_SUMMARY
          echo '| Architecture | Size |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          for f in android/app/build/outputs/apk/release/*.apk; do
            size=$(stat --printf="%s" "$f")
            size_kb=$((size / 1024))
            filename=$(basename "$f")
            echo "| $filename | ${size_kb}KB |" >> $GITHUB_STEP_SUMMARY
          done
