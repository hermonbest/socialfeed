name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Clean stale lock file and install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download Gradle wrapper jar
        run: |
          curl -sL https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar \
            -o android/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Bundle JS for Android
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Debug - Check local Maven repo
        run: |
          echo "=== react-native/android Maven repo ==="
          find node_modules/react-native/android -name "*.pom" -o -name "maven-metadata.xml" | head -30
          echo ""
          echo "=== @react-native/gradle-plugin ==="
          ls -la node_modules/@react-native/gradle-plugin/ 2>/dev/null || echo "NOT FOUND"
          echo ""
          echo "=== Checking for react-native artifact ==="
          find node_modules/react-native/android -path "*/react-native/*" | head -20

      - name: Build Release APKs
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APKs with ABI info
        run: |
          cd android/app/build/outputs/apk/release
          for f in *.apk; do
            if [ -f "$f" ]; then
              abi=$(echo "$f" | sed -n 's/.*\(armeabi-v7a\|arm64-v8a\|x86_64\).*/\1/p')
              if [ -z "$abi" ]; then
                mv "$f" "PhotoStudio-$f"
              else
                mv "$f" "PhotoStudio-$abi.apk"
              fi
            fi
          done

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PhotoStudio-APKs
          path: android/app/build/outputs/apk/release/*.apk
          compression-level: 0

      - name: Get APK sizes
        run: |
          echo "### APK Build Sizes" >> $GITHUB_STEP_SUMMARY
          echo '| Architecture | Size |' >> $GITHUB_STEP_SUMMARY
          echo '|---|---|' >> $GITHUB_STEP_SUMMARY
          for f in android/app/build/outputs/apk/release/*.apk; do
            size=$(stat --printf="%s" "$f")
            size_kb=$((size / 1024))
            filename=$(basename "$f")
            echo "| $filename | ${size_kb}KB |" >> $GITHUB_STEP_SUMMARY
          done
